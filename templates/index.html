<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deltix — Bot del Humedal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            delta: {
              50:  '#f0f9f0', 100: '#dcf0dc', 200: '#b8e0b8',
              300: '#86c986', 400: '#52ad52', 500: '#2e8b2e',
              600: '#1f6e1f', 700: '#175417', 800: '#113811', 900: '#0a240a',
            },
            water: { 500: '#0ea5e9', 600: '#0284c7' },
          },
          fontFamily: { sans: ['"Inter"', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .message-bubble { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #52ad52;
      display: inline-block; animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0);opacity:.4; } 40% { transform:translateY(-6px);opacity:1; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2e8b2e44; border-radius: 10px; }
    .quick-btn { @apply flex items-center gap-2 text-left text-sm text-delta-100 bg-delta-700 hover:bg-delta-600 rounded-xl px-3 py-2.5 transition w-full; }
    .section-label { @apply text-delta-500 text-xs font-semibold uppercase tracking-widest mt-3 mb-1 px-1; }
  </style>
</head>
<body class="bg-delta-900 font-sans flex flex-col h-full">

  <!-- Header -->
  <header class="bg-delta-800 border-b border-delta-700 px-4 py-3 flex items-center gap-3 shrink-0 shadow-lg">
    <div class="text-3xl select-none">🦫</div>
    <div>
      <h1 class="text-white font-bold text-lg leading-tight">Deltix</h1>
      <p class="text-delta-300 text-xs">Bot del humedal · Delta del Paraná</p>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-delta-400 animate-pulse inline-block"></span>
      <span class="text-delta-300 text-xs">en línea</span>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="hidden md:flex flex-col w-60 bg-delta-800 border-r border-delta-700 p-3 gap-1 shrink-0 overflow-y-auto">

      <p class="section-label">Clima y agua</p>
      <button onclick="sendQuick('¿Cómo está el clima?')" class="quick-btn"><span>☁️</span> Clima</button>
      <button onclick="sendQuick('mareas')" class="quick-btn"><span>🌊</span> Mareas INA</button>
      <button onclick="sendQuick('hidrografia')" class="quick-btn"><span>📊</span> Hidrografía Naval</button>
      <button onclick="sendQuick('windguru')" class="quick-btn"><span>💨</span> WindGurú</button>

      <p class="section-label">Colectivas</p>
      <button onclick="sendQuick('jilguero')" class="quick-btn"><span>🚢</span> Jilguero</button>
      <button onclick="sendQuick('interislena')" class="quick-btn"><span>⛵</span> Interisleña</button>
      <button onclick="sendQuick('lineas delta')" class="quick-btn"><span>🛥️</span> Líneas Delta</button>
      <button onclick="sendQuick('almaceneras')" class="quick-btn"><span>🛒</span> Almaceneras</button>

      <p class="section-label">Agenda del río</p>
      <button onclick="sendQuick('amanita canoa')" class="quick-btn"><span>🛶</span> Amanita Canoa</button>
      <button onclick="sendQuick('alfareria kutral')" class="quick-btn"><span>🏺</span> Kutral Alfarería</button>
      <button onclick="sendQuick('labusqueda')" class="quick-btn"><span>🌿</span> La Búsqueda</button>
      <button onclick="sendQuick('canaveral kayaks')" class="quick-btn"><span>🚣</span> Cañaveral Kayaks</button>
      <button onclick="sendQuick('charco masajes')" class="quick-btn"><span>💆</span> Masaje Thai</button>
      <button onclick="sendQuick('familia islena')" class="quick-btn"><span>🌾</span> Familia Isleña</button>

      <div class="mt-auto pt-4 border-t border-delta-700 text-center">
        <p class="text-delta-500 text-xs leading-snug">También en Telegram<br><span class="text-delta-400 font-medium">@deltixbot</span></p>
      </div>
    </aside>

    <!-- Chat -->
    <main class="flex flex-col flex-1 overflow-hidden">

      <!-- Messages -->
      <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-5 space-y-4">

        <!-- Welcome -->
        <div class="message-bubble flex items-end gap-2 max-w-2xl">
          <div class="text-2xl shrink-0 mb-1">🦫</div>
          <div class="bg-delta-700 text-delta-50 rounded-2xl rounded-bl-sm px-4 py-3 text-sm leading-relaxed shadow">
            <p>¡Hola! Soy <strong>Deltix</strong>, el carpincho digital del Delta del Paraná. 🌿</p>
            <p class="mt-1 text-delta-200 text-xs">Preguntame sobre clima, mareas, hidrografía, colectivas, almaceneras o actividades en el delta.</p>
          </div>
        </div>

        <!-- Mobile chips -->
        <div class="flex md:hidden flex-wrap gap-2">
          <button onclick="sendQuick('mareas')" class="chip">🌊 Mareas</button>
          <button onclick="sendQuick('hidrografia')" class="chip">📊 Hidrografía</button>
          <button onclick="sendQuick('windguru')" class="chip">💨 Windgurú</button>
          <button onclick="sendQuick('jilguero')" class="chip">🚢 Jilguero</button>
          <button onclick="sendQuick('interislena')" class="chip">⛵ Interisleña</button>
          <button onclick="sendQuick('almaceneras')" class="chip">🛒 Almaceneras</button>
        </div>

      </div>

      <!-- Input -->
      <div class="shrink-0 bg-delta-800 border-t border-delta-700 px-4 py-3">
        <form id="chat-form" class="flex items-end gap-2">
          <textarea id="message-input" rows="1"
            placeholder="Escribí tu consulta..."
            class="flex-1 bg-delta-700 text-delta-50 placeholder-delta-400 rounded-2xl px-4 py-3 text-sm resize-none max-h-32 border border-delta-600 focus:border-delta-400 focus:outline-none transition"
          ></textarea>
          <button type="submit" id="send-btn"
            class="shrink-0 bg-delta-500 hover:bg-delta-400 active:scale-95 text-white rounded-2xl w-11 h-11 flex items-center justify-center transition shadow disabled:opacity-40 disabled:cursor-not-allowed">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 rotate-90">
              <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
            </svg>
          </button>
        </form>
      </div>

    </main>
  </div>

  <style>
    .chip { @apply bg-delta-700 hover:bg-delta-600 text-delta-100 text-xs rounded-full px-3 py-1.5 transition border border-delta-600; }
  </style>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const messagesEl = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('send-btn');

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 128) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.dispatchEvent(new Event('submit')); }
    });

    const scrollToBottom = () => { messagesEl.scrollTop = messagesEl.scrollHeight; };

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatText(text) {
      return escapeHtml(text)
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function addMessage(role, text, images = []) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message-bubble flex items-end gap-2 max-w-2xl' + (role === 'user' ? ' ml-auto flex-row-reverse' : '');

      if (role === 'assistant') {
        const av = document.createElement('div');
        av.className = 'text-2xl shrink-0 mb-1';
        av.textContent = '🦫';
        wrapper.appendChild(av);
      }

      const col = document.createElement('div');
      col.className = 'flex flex-col gap-2 ' + (role === 'user' ? 'items-end' : 'items-start');

      if (text) {
        const bubble = document.createElement('div');
        bubble.className = role === 'user'
          ? 'bg-water-600 text-white rounded-2xl rounded-br-sm px-4 py-3 text-sm leading-relaxed shadow'
          : 'bg-delta-700 text-delta-50 rounded-2xl rounded-bl-sm px-4 py-3 text-sm leading-relaxed shadow';
        bubble.innerHTML = formatText(text);
        col.appendChild(bubble);
      }

      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = 'imagen';
        img.className = 'rounded-xl shadow-lg max-w-xs md:max-w-sm w-full cursor-pointer';
        img.onclick = () => window.open(src, '_blank');
        col.appendChild(img);
      });

      wrapper.appendChild(col);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function addTyping() {
      const w = document.createElement('div');
      w.id = 'typing';
      w.className = 'message-bubble flex items-end gap-2';
      w.innerHTML = `<div class="text-2xl shrink-0 mb-1">🦫</div>
        <div class="bg-delta-700 rounded-2xl rounded-bl-sm px-4 py-3 shadow flex gap-1">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>`;
      messagesEl.appendChild(w);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage('user', text);
      addTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        removeTyping();
        addMessage('assistant', data.reply || '', data.images || []);
      } catch {
        removeTyping();
        addMessage('assistant', 'Error de conexión. Intentá de nuevo.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    function sendQuick(text) { sendMessage(text); }

    form.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(input.value); });
  </script>

</body>
</html>
