<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deltix — Bot del Humedal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; }

    /* ── Base ── */
    body {
      background: #020b02;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,200,60,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,100,30,0.08) 0%, transparent 60%);
      color: #d4edda;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.2); border-radius: 10px; }

    /* ── Header ── */
    header {
      background: rgba(5,20,5,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,255,65,0.12);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 40px rgba(0,255,65,0.05);
      z-index: 10;
    }
    .header-avatar {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 1.5px solid rgba(0,255,65,0.35);
      box-shadow: 0 0 12px rgba(0,255,65,0.2);
      object-fit: cover;
      flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; color: rgba(0,255,65,0.6); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff41;
      box-shadow: 0 0 8px #00ff41;
      animation: pulse-dot 2s infinite;
      margin-left: auto;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; box-shadow: 0 0 8px #00ff41; }
      50%      { opacity: 0.5; box-shadow: 0 0 3px #00ff41; }
    }
    .status-label { font-size: 11px; color: rgba(0,255,65,0.5); font-family: 'JetBrains Mono', monospace; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: rgba(3,12,3,0.7);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(0,255,65,0.08);
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 14px 10px;
      overflow-y: auto;
    }
    .section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0,255,65,0.35);
      font-family: 'JetBrains Mono', monospace;
      padding: 10px 8px 4px;
    }
    .quick-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: rgba(212,237,218,0.7);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }
    .quick-btn:hover {
      background: rgba(0,255,65,0.07);
      color: #d4edda;
    }
    .quick-btn .icon { font-size: 15px; flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(0,255,65,0.08);
      text-align: center;
    }
    .sidebar-footer p { font-size: 11px; color: rgba(0,255,65,0.3); line-height: 1.6; }
    .sidebar-footer span { color: rgba(0,255,65,0.55); font-family: 'JetBrains Mono', monospace; }

    /* ── Chat main ── */
    main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ── Messages ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Bubbles ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 720px;
      animation: msgIn 0.2s ease-out;
    }
    @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-row.user { margin-left: auto; flex-direction: row-reverse; }

    .bot-avatar {
      width: 32px; height: 32px;
      border-radius: 9px;
      border: 1px solid rgba(0,255,65,0.25);
      box-shadow: 0 0 8px rgba(0,255,65,0.15);
      object-fit: cover;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .msg-col { display: flex; flex-direction: column; gap: 6px; }
    .msg-row.user .msg-col { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      max-width: 480px;
      word-break: break-word;
    }
    .bubble.bot {
      background: rgba(10,30,10,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,255,65,0.12);
      color: #d4edda;
      border-radius: 16px 16px 16px 4px;
    }
    .bubble.user {
      background: linear-gradient(135deg, rgba(0,180,50,0.25), rgba(0,120,30,0.35));
      border: 1px solid rgba(0,255,65,0.2);
      color: #e8f5e9;
      border-radius: 16px 16px 4px 16px;
    }

    .chat-image {
      max-width: 320px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0,255,65,0.15);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .chat-image:hover { transform: scale(1.02); box-shadow: 0 6px 30px rgba(0,255,65,0.15); }

    /* ── Typing indicator ── */
    #typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      background: rgba(10,30,10,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,255,65,0.12);
      border-radius: 16px 16px 16px 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00ff41;
      animation: tdot 1.2s infinite ease-in-out;
      box-shadow: 0 0 6px #00ff41;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-5px);opacity:1} }

    /* ── Mobile chips ── */
    .chips { display: none; flex-wrap: wrap; gap: 6px; }
    @media (max-width: 767px) { aside { display: none; } .chips { display: flex; } }
    .chip {
      background: rgba(0,255,65,0.06);
      border: 1px solid rgba(0,255,65,0.15);
      color: rgba(212,237,218,0.8);
      font-size: 11.5px;
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .chip:hover { background: rgba(0,255,65,0.12); border-color: rgba(0,255,65,0.3); color: #d4edda; }

    /* ── Input bar ── */
    .input-bar {
      flex-shrink: 0;
      background: rgba(3,12,3,0.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,255,65,0.1);
      padding: 12px 16px;
    }
    .input-form { display: flex; align-items: flex-end; gap: 10px; }
    textarea {
      flex: 1;
      background: rgba(0,255,65,0.04);
      border: 1px solid rgba(0,255,65,0.15);
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 13.5px;
      color: #d4edda;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    textarea::placeholder { color: rgba(212,237,218,0.3); }
    textarea:focus {
      border-color: rgba(0,255,65,0.35);
      box-shadow: 0 0 0 3px rgba(0,255,65,0.07);
    }
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(0,255,65,0.25);
      background: rgba(0,255,65,0.1);
      color: #00ff41;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: rgba(0,255,65,0.18); box-shadow: 0 0 16px rgba(0,255,65,0.2); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="/img/bot_icon.png" alt="Deltix" class="header-avatar">
    <div>
      <div class="header-title">Deltix</div>
      <div class="header-sub">bot_del_humedal · delta_del_paraná</div>
    </div>
    <div class="status-dot"></div>
    <span class="status-label">online</span>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside>
      <span class="section-label">// clima y agua</span>
      <button class="quick-btn" onclick="sendQuick('¿Cómo está el clima?')"><span class="icon">☁️</span> Clima</button>
      <button class="quick-btn" onclick="sendQuick('mareas')"><span class="icon">🌊</span> Mareas INA</button>
      <button class="quick-btn" onclick="sendQuick('hidrografia')"><span class="icon">📊</span> Hidrografía Naval</button>
      <button class="quick-btn" onclick="sendQuick('windguru')"><span class="icon">💨</span> WindGurú</button>

      <span class="section-label">// colectivas</span>
      <button class="quick-btn" onclick="sendQuick('jilguero')"><span class="icon">🚢</span> Jilguero</button>
      <button class="quick-btn" onclick="sendQuick('interislena')"><span class="icon">⛵</span> Interisleña</button>
      <button class="quick-btn" onclick="sendQuick('lineas delta')"><span class="icon">🛥️</span> Líneas Delta</button>
      <button class="quick-btn" onclick="sendQuick('almaceneras')"><span class="icon">🛒</span> Almaceneras</button>

      <span class="section-label">// agenda del río</span>
      <button class="quick-btn" onclick="sendQuick('amanita canoa')"><span class="icon">🛶</span> Amanita Canoa</button>
      <button class="quick-btn" onclick="sendQuick('alfareria kutral')"><span class="icon">🏺</span> Kutral Alfarería</button>
      <button class="quick-btn" onclick="sendQuick('labusqueda')"><span class="icon">🌿</span> La Búsqueda</button>
      <button class="quick-btn" onclick="sendQuick('canaveral kayaks')"><span class="icon">🚣</span> Cañaveral Kayaks</button>
      <button class="quick-btn" onclick="sendQuick('charco masajes')"><span class="icon">💆</span> Masaje Thai</button>
      <button class="quick-btn" onclick="sendQuick('familia islena')"><span class="icon">🌾</span> Familia Isleña</button>

      <div class="sidebar-footer">
        <p>También en Telegram<br><span>@deltixbot</span></p>
      </div>
    </aside>

    <!-- Chat -->
    <main>
      <div id="chat-messages">

        <!-- Welcome -->
        <div class="msg-row">
          <img src="/img/bot_icon.png" alt="Deltix" class="bot-avatar">
          <div class="msg-col">
            <div class="bubble bot">
              Hola! Soy <strong>Deltix</strong>, el carpincho digital del Delta del Paraná 🌿<br>
              <span style="font-size:12px;color:rgba(212,237,218,0.55);">Preguntame sobre clima, mareas, hidrografía, colectivas, almaceneras o actividades.</span>
            </div>
          </div>
        </div>

        <!-- Mobile chips -->
        <div class="chips">
          <button class="chip" onclick="sendQuick('mareas')">🌊 Mareas</button>
          <button class="chip" onclick="sendQuick('hidrografia')">📊 Hidrografía</button>
          <button class="chip" onclick="sendQuick('windguru')">💨 Windgurú</button>
          <button class="chip" onclick="sendQuick('jilguero')">🚢 Jilguero</button>
          <button class="chip" onclick="sendQuick('interislena')">⛵ Interisleña</button>
          <button class="chip" onclick="sendQuick('almaceneras')">🛒 Almaceneras</button>
        </div>

      </div>

      <!-- Input -->
      <div class="input-bar">
        <form class="input-form" id="chat-form">
          <textarea id="message-input" rows="1" placeholder="Escribí tu consulta..."></textarea>
          <button type="submit" class="send-btn" id="send-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(90deg)">
              <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const messages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('send-btn');
    const BOT_AVATAR = '/img/bot_icon.png';

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    });
    form.addEventListener('submit', e => { e.preventDefault(); submit(); });

    const scrollBottom = () => { messages.scrollTop = messages.scrollHeight; };

    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(text) {
      return escHtml(text)
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.*?)\*/g,'<em>$1</em>')
        .replace(/\n/g,'<br>');
    }

    function addMessage(role, text, images = []) {
      const row = document.createElement('div');
      row.className = 'msg-row' + (role === 'user' ? ' user' : '');
      row.style.animation = 'msgIn 0.2s ease-out';

      if (role === 'bot') {
        const av = document.createElement('img');
        av.src = BOT_AVATAR; av.alt = 'Deltix'; av.className = 'bot-avatar';
        row.appendChild(av);
      }

      const col = document.createElement('div');
      col.className = 'msg-col';

      if (text) {
        const bub = document.createElement('div');
        bub.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
        bub.innerHTML = fmt(text);
        col.appendChild(bub);
      }

      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src; img.alt = ''; img.className = 'chat-image';
        img.onclick = () => window.open(src, '_blank');
        col.appendChild(img);
      });

      row.appendChild(col);
      messages.appendChild(row);
      scrollBottom();
    }

    function addTyping() {
      const row = document.createElement('div');
      row.id = 'typing-row'; row.className = 'msg-row';
      const av = document.createElement('img');
      av.src = BOT_AVATAR; av.alt = ''; av.className = 'bot-avatar';
      const bub = document.createElement('div');
      bub.className = 'typing-bubble';
      bub.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      row.appendChild(av); row.appendChild(bub);
      messages.appendChild(row);
      scrollBottom();
    }
    function removeTyping() { document.getElementById('typing-row')?.remove(); }

    async function submit() {
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; input.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage('user', text);
      addTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        removeTyping();
        addMessage('bot', data.reply || '', data.images || []);
      } catch {
        removeTyping();
        addMessage('bot', 'Error de conexión. Intentá de nuevo.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    function sendQuick(text) {
      input.value = text;
      submit();
    }
  </script>
</body>
</html>
